<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanika Chauhan | Official Premium Experience</title>
    <meta name="description"
        content="Welcome to the official premium platform of Kanika Chauhan. Connect directly via private calls, chat, and access exclusive content.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premium: {
                            teal: '#14b8a6',
                            'teal-light': '#5eead4',
                            dark: '#050d14',
                            card: 'rgba(10, 28, 46, 0.88)',
                            border: 'rgba(56, 189, 248, 0.2)',
                            blue: '#3b82f6',
                            'blue-light': '#93c5fd',
                        }
                    },
                    fontFamily: {
                        sans: ['Sora', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 2.5s infinite linear',
                        'float': 'float 8s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 3s ease-in-out infinite',
                        'orb-drift': 'orb-drift 18s ease-in-out infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '100%': { transform: 'translateX(100%)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: '0.5', transform: 'scale(1)' },
                            '50%': { opacity: '1', transform: 'scale(1.08)' },
                        },
                        'orb-drift': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '25%': { transform: 'translate(30px, -20px) scale(1.05)' },
                            '50%': { transform: 'translate(60px, 10px) scale(0.97)' },
                            '75%': { transform: 'translate(20px, 30px) scale(1.03)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Sora:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/index.css">

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #fb7185 0%, #f9a8d4 45%, #e879f9 100%);
        }

        body {
            background-color: #0d0509;
            color: #fce7f3;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .text-gradient-gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-gold-gradient { background: var(--gold-gradient); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(244, 114, 182, 0.16), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
      }
    }
    </script>
</head>

<body class="selection:bg-premium-gold/30">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
