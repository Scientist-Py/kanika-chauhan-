<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanika Chauhan | Official Premium Experience</title>
    <meta name="description"
        content="Welcome to the official premium platform of Kanika Chauhan. Connect directly via private calls, chat, and access exclusive content.">

    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premium: {
                            gold: '#0d9488', /* Teal-600 used as main accent */
                            'gold-light': '#5eead4', /* Teal-300 */
                            dark: '#ffffff', /* White background */
                            card: 'rgba(255, 255, 255, 0.95)',
                            border: 'rgba(13, 148, 136, 0.2)',
                            purple: '#9333ea', /* Purple-600 */
                            'purple-light': '#d8b4fe',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 2.5s infinite linear',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '100%': { transform: 'translateX(100%)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/index.css">

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #0d9488 0%, #2dd4bf 45%, #9333ea 50%, #c084fc 55%, #0d9488 100%);
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        .text-gradient-gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-gold-gradient {
            background: var(--gold-gradient);
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(13, 148, 136, 0.2);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .glass-premium {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.8) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(13, 148, 136, 0.3);
            box-shadow: 0 8px 32px 0 rgba(13, 148, 136, 0.1);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .animate-shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(13, 148, 136, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
      }
    }
    </script>
</head>

<body class="selection:bg-premium-gold/30">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
